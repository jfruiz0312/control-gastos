server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/management_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: never

logging:
  level:
    com.fernandoruiz.app.management: DEBUG
    org.hibernate.SQL: DEBUG
